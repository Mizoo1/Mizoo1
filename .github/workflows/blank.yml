name: Upload Folder Content

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Schritte zum Repo hinzufügen, damit der Job darauf zugreifen kann
      - name: Checkout repository
        uses: actions/checkout@v2

      # Führe deine Build-Schritte hier aus, um den gewünschten Inhalt im 'dist'-Verzeichnis zu erzeugen
      # Beispiel: Kompilieren, Tests durchführen, etc.

      # Erstelle ein Verzeichnis, in das die generierten Dateien kopiert werden
      - name: Prepare Dist Directory
        run: mkdir dist

      # Kopiere die generierten Dateien in das 'dist'-Verzeichnis (beispielhaft)
      - name: Copy Files to Dist
        run: cp -r ./build/* dist/

      # Anzeigen des Inhalts des 'dist'-Verzeichnisses zur Überprüfung
      - name: Show Dist Contents
        run: ls dist

      # Hochladen des 'dist'-Verzeichnisinhalts als Artefakt
      - name: Upload Dist Folder
        uses: actions/upload-artifact@v2
        with:
          name: dist-artifact
          path: ./dist
