name: Muaaz

on:
  schedule:
    # Jede 6 Stunden
    - cron: "0 */6 * * *"

# Dieser Befehl ermöglicht es uns, die Aktion automatisch aus dem "Actions"-Tab auszuführen.
workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Schritte zum Repo hinzufügen, damit der Job darauf zugreifen kann
      - name: Checkout repository
        uses: actions/checkout@v2

      # Schritte zur Erzeugung der "Snake"-Animation
      - name: Generate Snake
        run: |
          # Installiere die erforderlichen Pakete
          sudo apt-get update
          sudo apt-get -y install python3 python3-pip
          pip3 install git+https://github.com/Platane/snk.git

          # Führe das Skript zur Erstellung der "Snake"-Animation aus
          snk --gh_user mizoo1 --gh_email muaaz@example.com

      # Anzeigen des Status des Builds, um etwaige Probleme zu erkennen
      - name: Show Build Status
        run: git status

      # Erzeugung der GitHub Pages mit den generierten Dateien
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: .

