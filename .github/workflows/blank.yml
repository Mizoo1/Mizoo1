name: Muaaz

on:
  schedule:
    # Jede 6 Stunden
    - cron: "0 */6 * * *"

# Dieser Befehl ermöglicht es uns, die Aktion automatisch aus dem "Actions"-Tab auszuführen.
workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Schritte zum Repo hinzufügen, damit der Job darauf zugreifen kann
      - name: Checkout repository
        uses: actions/checkout@v2

      # Schritte zur Erzeugung der "Snake"-Animation
      - name: Generate Snake
        uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: mizoo1
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Anzeigen des Status des Builds, um etwaige Probleme zu erkennen
      - name: Show Build Status
        run: git status

      # Push der Änderungen
      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.MY_GITHUB_TOKEN }} # Neues persönliches Zugriffstoken
          branch: master
          force: true

      # Erzeugung der GitHub Pages mit den generierten Dateien
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Aktualisierung der Ausgabe mit Environment Files
      - name: Create Environment File
        run: echo '::set-output name=snake_gif_path::dist/github-contribution-grid-snake.gif' > output.txt

      - name: Set Output from Environment File
        id: set_output
        run: echo "::set-output name=snake_gif_path::$(cat output.txt)"
